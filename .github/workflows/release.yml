name: release

# Lives at the repository root so GitHub Actions actually runs it (workflows are
# only discovered under <repo-root>/.github/workflows/). It builds and publishes
# the `pquantlib` package, which lives in the `pquantlib/` subdirectory of this
# uv workspace monorepo.

on:
  push:
    tags: ['v*']            # a pushed v* tag publishes to PyPI
  workflow_dispatch:        # manual run — used for the TestPyPI dry-run
    inputs:
      target:
        description: 'Publish target (testpypi for the dry-run)'
        required: true
        default: 'testpypi'
        type: choice
        options: [testpypi, pypi]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'   # build is version-independent (pure-Python, py3-none-any wheel)
      - name: Build sdist + wheel (the pquantlib package)
        run: |
          python -m pip install --upgrade build
          python -m build pquantlib      # -> pquantlib/dist/
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: pquantlib/dist/

  publish-testpypi:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
    runs-on: ubuntu-latest
    environment:                         # the Trusted-Publisher config on TestPyPI must name this environment
      name: testpypi
      url: https://test.pypi.org/p/pquantlib
    permissions:
      id-token: write          # OIDC — Trusted Publishing, no token
    steps:
      - uses: actions/download-artifact@v8
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true            # re-runnable dry-run (TestPyPI 400s on a duplicate version)

  publish-pypi:
    needs: build
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
    runs-on: ubuntu-latest
    environment:                         # the Trusted-Publisher config on PyPI must name this environment
      name: pypi
      url: https://pypi.org/p/pquantlib
    permissions:
      id-token: write          # OIDC — Trusted Publishing, no token
    steps:
      - uses: actions/download-artifact@v8
        with: { name: dist, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
